# Manual deploy when Cloudflare Workers Builds fails with Authentication error [10000]:
# add GitHub secret CLOUDFLARE_API_TOKEN (Account → Cloudflare Pages → Edit for homeseeker).
# Run: Actions → "Deploy Cloudflare Pages" → Run workflow.

name: Deploy Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: wrangler pages deploy
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
