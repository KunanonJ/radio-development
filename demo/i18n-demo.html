<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Radio Development — Thai i18n demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-en: system-ui, sans-serif;
      --font-th: 'Sarabun', 'Leelawadee UI', Tahoma, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      font-family: var(--font-en);
      max-width: 640px;
      margin: 0 auto;
      padding: 1.5rem;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    body.lang-th { font-family: var(--font-th); }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .toolbar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    button {
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      border: 1px solid #555;
      background: #333;
      color: #e0e0e0;
      border-radius: 4px;
    }
    button:hover { background: #444; }
    button.active { background: #0066cc; border-color: #0066cc; }
    .card {
      background: #252525;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }
    .card h2 { font-size: 0.9rem; opacity: 0.9; margin: 0 0 0.5rem 0; }
    .card p { margin: 0.25rem 0; font-size: 0.95rem; }
    .meta { font-size: 0.8rem; opacity: 0.6; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Radio Development — Locale demo</h1>
  <p class="meta">PRD Thai support (TH-005, TH-012): UTF-8, Thai font (Sarabun), language switch.</p>
  <div class="toolbar">
    <button id="lang-en" class="active">English</button>
    <button id="lang-th">ภาษาไทย</button>
  </div>
  <div id="content"></div>

  <script>
    const LOCALES = { en: {}, th: {} };
    const modules = ['common', 'player', 'playlist', 'library', 'scheduler', 'streaming', 'ads', 'reports', 'errors'];

    async function loadLocales(lang) {
      if (LOCALES[lang].common) return LOCALES[lang];
      for (const mod of modules) {
        const res = await fetch(`../locales/${lang}/${mod}.json`);
        if (!res.ok) continue;
        LOCALES[lang][mod] = await res.json();
      }
      return LOCALES[lang];
    }

    function flatten(data) {
      const out = {};
      for (const [mod, obj] of Object.entries(data)) {
        if (!obj || obj._meta) continue;
        for (const [k, v] of Object.entries(obj)) {
          if (k === '_meta' || typeof v !== 'string') continue;
          out[`${mod}.${k}`] = v;
        }
      }
      return out;
    }

    function render(lang) {
      const t = flatten(LOCALES[lang]);
      document.body.classList.toggle('lang-th', lang === 'th');
      document.getElementById('lang-en').classList.toggle('active', lang === 'en');
      document.getElementById('lang-th').classList.toggle('active', lang === 'th');

      const html = `
        <div class="card"><h2>Common</h2>
          <p><b>${t['common.app_name']}</b> — ${t['common.settings']}, ${t['common.language']}: ${t['common.language_thai']} / ${t['common.language_english']}</p>
          <p>${t['common.play']} | ${t['common.pause']} | ${t['common.stop']} | ${t['common.next']}</p>
        </div>
        <div class="card"><h2>${t['player.title']}</h2>
          <p>${t['player.current_track']} · ${t['player.next_track']} · ${t['player.crossfade']} · ${t['player.live_assist']}</p>
        </div>
        <div class="card"><h2>${t['playlist.title']}</h2>
          <p>${t['playlist.playlist_generator']} · ${t['playlist.repeat_protection']} · ${t['playlist.dayparting']}</p>
        </div>
        <div class="card"><h2>${t['library.title']}</h2>
          <p>${t['library.tracks']} · ${t['library.tags']} · ${t['library.prelisten']} · ${t['library.update_library']}</p>
        </div>
        <div class="card"><h2>${t['scheduler.title']}</h2>
          <p>${t['scheduler.events']} · ${t['scheduler.add_event']} · ${t['scheduler.recurring']}</p>
        </div>
        <div class="card"><h2>${t['streaming.title']}</h2>
          <p>${t['streaming.encoder']} · ${t['streaming.listeners']} · ${t['streaming.now_playing_export']} · ${t['streaming.statistics']}</p>
        </div>
        <div class="card"><h2>${t['ads.title']}</h2>
          <p>${t['ads.commercial_break']} · ${t['ads.groups']} · ${t['ads.start_date']} · ${t['ads.end_date']}</p>
        </div>
        <div class="card"><h2>${t['reports.title']}</h2>
          <p>${t['reports.date_range']} · ${t['reports.export_xls']} · ${t['reports.export_pdf']} · ${t['reports.airplay']}</p>
        </div>
        <div class="card"><h2>${t['common.error']}</h2>
          <p>${t['errors.file_not_found']} · ${t['errors.connection_failed']} · ${t['errors.please_restart']}</p>
        </div>
      `;
      document.getElementById('content').innerHTML = html;
    }

    (async () => {
      await loadLocales('en');
      await loadLocales('th');
      let lang = 'en';
      render(lang);
      document.getElementById('lang-en').onclick = () => { lang = 'en'; render(lang); };
      document.getElementById('lang-th').onclick = () => { lang = 'th'; render(lang); };
    })();
  </script>
</body>
</html>
